version: '3.8'
services:
  app:
    image: node-app:latest # Points to the image we will build in GitHub Actions
    env_file: .env
    deploy:
      replicas: 5 
      update_config:
        parallelism: 1 # Updates 1 container at a time for zero-downtime deployments
        delay: 10s
      restart_policy:
        condition: any # Swarm will aggressively restart failed containers
    
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dswebapnahai.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro 
    depends_on:
      - app
