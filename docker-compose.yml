version: '3.8'
services:
  app:
    build: .
    restart: always
    env_file: .env
    expose:
      - "3000" 
    deploy:
      replicas: 5 # Scales to 5 containers
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dswebapnahai.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
