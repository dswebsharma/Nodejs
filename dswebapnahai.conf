server {
    listen 80;
    server_name  dswebapnahai.shop www.dswebapnahai.shop;   # OR use your public IP
    return 301 https://$host$request_uri;
}
 
server {
    listen 443 ssl;
    server_name dswebapnahai.shop www.dswebapnahai.shop;
    # Point to the SSL certificates mounted from the EC2 host
    ssl_certificate /etc/letsencrypt/live/dswebapnahai.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dswebapnahai.shop/privkey.pem;

    # Recommended SSL settings for security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
	
    #Increase upload size (important for image uploads)
    client_max_body_size 128M;
    resolver 127.0.0.11 valid=10s;
    set $upstream http://app:3000;
    location / {
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; # Tell Node it's HTTPS
    }
}
